---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: vpcdomains.nx.cisco.networking.metal.ironcore.dev
spec:
  group: nx.cisco.networking.metal.ironcore.dev
  names:
    kind: VPCDomain
    listKind: VPCDomainList
    plural: vpcdomains
    shortNames:
    - vpcdomain
    singular: vpcdomain
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.deviceRef.name
      name: Device
      type: string
    - jsonPath: .spec.domainId
      name: Domain
      type: string
    - jsonPath: .spec.adminState
      name: Enabled
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Configured")].status
      name: Configured
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="Operational")].status
      name: Operational
      priority: 1
      type: string
    - jsonPath: .status.keepaliveStatus
      name: KeepAliveStatus
      priority: 1
      type: string
    - jsonPath: .status.peerStatus
      name: PeerStatus
      priority: 1
      type: string
    - jsonPath: .status.role
      name: Role
      priority: 1
